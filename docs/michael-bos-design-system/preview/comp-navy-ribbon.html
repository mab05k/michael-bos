<!doctype html>
<!-- @dsCard group="Brand" name="Components · Navy ribbon" subtitle="Bio-only USN block" viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.ribbon { background:var(--navy); color:var(--bone-on-navy); padding:24px 28px; border-radius:var(--r-md); position:relative; overflow:hidden; }
.ribbon::before { content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:linear-gradient(to bottom, var(--brass) 0 33%, #fff 33% 66%, var(--brass) 66% 100%); }
.ribbon .eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--brass-bright); }
.ribbon h4 { font-family:var(--font-display); font-size:22px; font-weight:600; margin:6px 0 4px; color:var(--bone-on-navy); line-height:1.2; }
.ribbon .meta-line { font-family:var(--font-mono); font-size:12px; color:var(--brass); letter-spacing:0.04em; }
.ribbon p { font-size:14px; line-height:1.6; color:var(--bone-on-navy); margin:10px 0 0; max-width:60ch; opacity:0.92; }
.svc-row { display:flex; gap:18px; margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--brass-bright); letter-spacing:0.06em; }
</style></head><body>
<div class="ribbon">
  <div class="eyebrow">⚓ Service record</div>
  <h4>U.S. Navy · 2008 — 2014</h4>
  <div class="meta-line">IT2 · Information Systems Technician · Two deployments</div>
  <p>The Navy is where I learned what a process is for. I run my engineering teams with the same calm we ran a watch: clear roles, written orders, room to act.</p>
  <div class="svc-row"><span>HONORABLE DISCHARGE</span><span>·</span><span>NAM × 2</span><span>·</span><span>GWOT-S</span></div>
</div>
</body></html>
