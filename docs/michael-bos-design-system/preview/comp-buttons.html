<!doctype html>
<!-- @dsCard group="Brand" name="Components · Buttons" subtitle="Primary, secondary, ghost, navy" viewport="700x170" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.btn {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.005em;
  padding: 10px 18px;
  border-radius: var(--r-sm);
  border: none;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background var(--dur-micro) var(--ease-out), color var(--dur-micro) var(--ease-out), box-shadow var(--dur-micro) var(--ease-out);
}
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--rust); color: #fff; }
.btn-primary:hover { background: var(--rust-deep); }
.btn-secondary { background: transparent; color: var(--canyon-ink); box-shadow: inset 0 0 0 1.5px var(--canyon-ink); }
.btn-secondary:hover { background: var(--canyon-ink); color: var(--bg-bone); }
.btn-ghost { background: transparent; color: var(--rust); padding-left: 8px; padding-right: 8px; }
.btn-ghost:hover { background: var(--rust-soft); }
.btn-navy { background: var(--brass); color: var(--navy); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; padding: 8px 14px; }
.btn-navy:hover { background: var(--brass-bright); }
</style></head><body>
<div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
  <button class="btn btn-primary">Get in touch <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
  <button class="btn btn-secondary">Read writing</button>
  <button class="btn btn-ghost">View résumé →</button>
</div>
<div style="margin-top:14px; display:flex; gap:12px; align-items:center;">
  <button class="btn btn-navy">Service record</button>
  <div class="meta">primary · secondary · ghost · navy</div>
</div>
</body></html>
