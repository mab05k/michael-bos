<!doctype html>
<!-- @dsCard group="Brand" name="Colors · CI/CD status" subtitle="Build pass / running / fail / idle" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
  <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
    <div style="display:flex; gap:2px;"><div style="width:48px; height:32px; background:var(--status-pass-bg); border-radius:var(--r-sm) 0 0 var(--r-sm);"></div><div style="width:48px; height:32px; background:var(--status-pass); border-radius:0 var(--r-sm) var(--r-sm) 0;"></div></div>
    <div class="swatch-name">pass · #3F8A4F</div>
    <div class="mono" style="font-size:11px; padding:2px 8px; border-radius:var(--r-pill); background:var(--status-pass-bg); color:var(--status-pass);">✓ passing</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
    <div style="display:flex; gap:2px;"><div style="width:48px; height:32px; background:var(--status-build-bg); border-radius:var(--r-sm) 0 0 var(--r-sm);"></div><div style="width:48px; height:32px; background:var(--status-build); border-radius:0 var(--r-sm) var(--r-sm) 0;"></div></div>
    <div class="swatch-name">build · #C8881A</div>
    <div class="mono" style="font-size:11px; padding:2px 8px; border-radius:var(--r-pill); background:var(--status-build-bg); color:var(--status-build);">▌ running</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
    <div style="display:flex; gap:2px;"><div style="width:48px; height:32px; background:var(--status-fail-bg); border-radius:var(--r-sm) 0 0 var(--r-sm);"></div><div style="width:48px; height:32px; background:var(--status-fail); border-radius:0 var(--r-sm) var(--r-sm) 0;"></div></div>
    <div class="swatch-name">fail · #B23A2A</div>
    <div class="mono" style="font-size:11px; padding:2px 8px; border-radius:var(--r-pill); background:var(--status-fail-bg); color:var(--status-fail);">× failed</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
    <div style="display:flex; gap:2px;"><div style="width:48px; height:32px; background:var(--status-idle-bg); border-radius:var(--r-sm) 0 0 var(--r-sm);"></div><div style="width:48px; height:32px; background:var(--status-idle); border-radius:0 var(--r-sm) var(--r-sm) 0;"></div></div>
    <div class="swatch-name">idle · #6E5945</div>
    <div class="mono" style="font-size:11px; padding:2px 8px; border-radius:var(--r-pill); background:var(--status-idle-bg); color:var(--status-idle);">— queued</div>
  </div>
</div>
</body></html>
