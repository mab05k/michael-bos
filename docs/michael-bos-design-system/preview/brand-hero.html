<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.hero { position:relative; height:280px; overflow:hidden; border-radius:var(--r-md); background:#0a0604; }
/* Image is 732×1234 portrait. Climber is in the top ~25%. Bias crop to show
   the upper area (vertical 6%) and the climber's column (horizontal 38%). */
.hero img { width:100%; height:100%; object-fit:cover; object-position:38% 6%; }

/* Bottom-loaded scrim — climber stays visible up top, text sits in the dark band below. */
.hero::after {
  content:""; position:absolute; inset:0;
  background:
    linear-gradient(180deg, rgba(15,9,5,0) 0%, rgba(15,9,5,0) 38%, rgba(15,9,5,0.55) 70%, rgba(15,9,5,0.88) 100%),
    linear-gradient(90deg, rgba(15,9,5,0.35) 0%, rgba(15,9,5,0) 38%);
}

.hero-text {
  position:absolute; left:24px; right:24px; bottom:18px; z-index:2;
  text-shadow: 0 1px 12px rgba(0,0,0,0.55);
}
.hero-text .eyebrow {
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
  color: #F3D99E;
}
.hero-text h1 {
  font-family:var(--font-display); font-weight:700; font-size:30px; line-height:1.05;
  letter-spacing:-0.02em; margin:6px 0 0; max-width:18ch;
  color: #FAF1DC;
}
.hero-meta {
  position:absolute; right:18px; top:18px; font-family:var(--font-mono); font-size:11px;
  color: #F3E9D2; letter-spacing:0.06em; z-index:2; padding: 4px 10px;
  background: rgba(15,9,5,0.55); border-radius: var(--r-pill); backdrop-filter: blur(2px);
}
</style></head><body style="padding:0;">
<div class="hero">
  <img src="../assets/michael-climbing.jpg" alt="Michael climbing red sandstone in Red Rock Canyon"/>
  <div class="hero-text">
    <div class="eyebrow">Michael Bos · Engineering Manager</div>
    <h1>Ship boring code. Build calm teams.</h1>
  </div>
  <div class="hero-meta">36°08′N · 115°27′W · Red Rock, NV</div>
</div>
</body></html>
