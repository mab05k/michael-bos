<!doctype html>
<!-- @dsCard group="Brand" name="Components · Form inputs" subtitle="Sentence-case labels · IBM Plex Sans" viewport="700x250" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
label {
  display:block;
  font-family:var(--font-body);
  font-size:14px;
  font-weight:500;
  color:var(--canyon-ink);
  margin-bottom:6px;
}
.field {
  width:100%;
  padding:10px 14px;
  border-radius:var(--r-sm);
  background:var(--bg-bone);
  border:1.5px solid var(--hairline-strong);
  font-family:var(--font-body);
  font-size:15px;
  color:var(--canyon-ink);
  outline:none;
  box-sizing:border-box;
  transition: border-color var(--dur-micro) var(--ease-out), box-shadow var(--dur-micro) var(--ease-out);
}
.field:focus { border-color: var(--rust); box-shadow: 0 0 0 3px var(--rust-soft); }
.hint { font-size:13px; color:var(--canyon-fade); margin-top:6px; }
</style></head><body>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
  <div>
    <label>Name</label>
    <input class="field" value="Avery Kim" />
  </div>
  <div>
    <label>Email</label>
    <input class="field" placeholder="you@company.com" />
  </div>
  <div style="grid-column: 1 / -1;">
    <label>What are you working on?</label>
    <textarea class="field" rows="2" placeholder="A short pitch. I read every one.">We're hiring an EM for a 40-person platform org.</textarea>
    <div class="hint">Plain text only. I'll reply within a week.</div>
  </div>
</div>
</body></html>
