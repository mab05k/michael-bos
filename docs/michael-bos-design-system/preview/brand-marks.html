<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Custom marks" subtitle="Carabiner, summit, anchors, pipeline" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.mark-cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
.mark-cell .box { width:64px; height:64px; background:var(--bg-sand); border-radius:var(--r-md); display:grid; place-items:center; color:var(--canyon-ink); box-shadow:var(--shadow-1); }
.mark-cell .box img { width:34px; height:34px; }
.mark-cell .n { font-family:var(--font-mono); font-size:11px; color:var(--canyon-shadow); }
.mark-cell .d { font-family:var(--font-body); font-size:11px; color:var(--canyon-fade); text-align:center; max-width:120px; line-height:1.3; }
</style></head><body>
<div style="display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap;">
  <div class="mark-cell"><div class="box"><img src="../assets/marks/carabiner.svg"/></div><div class="n">carabiner</div><div class="d">climbing section</div></div>
  <div class="mark-cell"><div class="box"><img src="../assets/marks/summit.svg"/></div><div class="n">summit</div><div class="d">goals · milestones</div></div>
  <div class="mark-cell"><div class="box"><img src="../assets/marks/anchor-climb.svg"/></div><div class="n">anchor-climb</div><div class="d">trad routes</div></div>
  <div class="mark-cell"><div class="box" style="background:var(--navy); color:var(--brass-bright);"><img src="../assets/marks/anchor-navy.svg" style="filter:invert(83%) sepia(38%) saturate(380%) hue-rotate(355deg) brightness(95%);"/></div><div class="n">anchor-navy</div><div class="d">USN bio block</div></div>
  <div class="mark-cell"><div class="box"><img src="../assets/marks/pipeline.svg"/></div><div class="n">pipeline</div><div class="d">CI/CD sections</div></div>
</div>
</body></html>
